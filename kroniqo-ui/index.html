<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kroniqo — Living Agent Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #080a0f;
    --surface: #0d1117;
    --border: #1e2530;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --accent3: #7c6af7;
    --text: #c9d1d9;
    --muted: #4a5568;
    --correct: #00ff88;
    --wrong: #ff4757;
    --neutral: #ffa502;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,136,0.015) 2px,
      rgba(0,255,136,0.015) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(8,10,15,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--text); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
    gap: 1.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .card-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
  }

  /* Age card — full width */
  .card-age {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 2rem;
  }

  .age-number {
    font-family: 'Syne', sans-serif;
    font-size: 4rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .age-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

  .biography-text {
    font-size: 0.8rem;
    line-height: 1.7;
    color: var(--text);
    border-left: 2px solid var(--accent);
    padding-left: 1rem;
  }

  .backend-info {
    text-align: right;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .backend-name {
    font-size: 1rem;
    color: var(--accent3);
    font-weight: 700;
    display: block;
    margin-bottom: 0.25rem;
  }

  /* Domains */
  .domain-list { display: flex; flex-direction: column; gap: 1rem; }

  .domain-item {}

  .domain-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.4rem;
    font-size: 0.75rem;
  }

  .domain-name { color: var(--text); }
  .domain-acc { color: var(--muted); }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .domain-meta {
    display: flex;
    justify-content: space-between;
    margin-top: 0.3rem;
    font-size: 0.6rem;
    color: var(--muted);
  }

  .calibration-tag {
    font-size: 0.6rem;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    border: 1px solid;
  }

  .calibration-tag.overconfident { color: var(--wrong); border-color: var(--wrong); }
  .calibration-tag.underconfident { color: var(--neutral); border-color: var(--neutral); }
  .calibration-tag.calibrated { color: var(--correct); border-color: var(--correct); }

  /* Recent decisions */
  .decisions-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    max-height: 300px;
    overflow-y: auto;
  }

  .decisions-list::-webkit-scrollbar { width: 3px; }
  .decisions-list::-webkit-scrollbar-track { background: var(--border); }
  .decisions-list::-webkit-scrollbar-thumb { background: var(--muted); }

  .decision-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.75rem;
    align-items: start;
    font-size: 0.7rem;
    padding: 0.6rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    transition: border-color 0.2s;
  }

  .decision-item:hover { border-color: var(--muted); }

  .decision-id { color: var(--muted); font-size: 0.6rem; }

  .decision-task {
    color: var(--text);
    line-height: 1.4;
    word-break: break-word;
  }

  .decision-domain {
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .outcome-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 3px;
    flex-shrink: 0;
  }

  .outcome-dot.correct { background: var(--correct); }
  .outcome-dot.wrong { background: var(--wrong); }
  .outcome-dot.pending { background: var(--neutral); }

  /* Risk posture */
  .posture-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 120px;
    gap: 0.5rem;
  }

  .posture-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .posture-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
  }

  .posture-name.conservative { color: var(--wrong); }
  .posture-name.bold { color: var(--correct); }
  .posture-name.neutral { color: var(--neutral); }

  .posture-desc { font-size: 0.65rem; color: var(--muted); text-align: center; }

  /* Refresh button */
  .refresh-btn {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 0.75rem 1.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    z-index: 50;
  }

  .refresh-btn:hover { background: #00cc6a; transform: translateY(-2px); }

  /* Loading state */
  .loading {
    color: var(--muted);
    font-size: 0.75rem;
    text-align: center;
    padding: 2rem;
  }

  .blink { animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Recent form dots */
  .form-dots { display: flex; gap: 4px; margin-top: 0.3rem; }
  .form-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .form-dot.correct { background: var(--correct); }
  .form-dot.wrong { background: var(--wrong); }
  .form-dot.partial { background: var(--neutral); }

  /* Full width cards */
  .span-full { grid-column: 1 / -1; }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    .card-age { grid-template-columns: 1fr; gap: 1rem; }
    .age-number { font-size: 3rem; }
    .backend-info { text-align: left; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Kroniq<span>o</span></div>
  <div class="status-pill">
    <div class="status-dot"></div>
    <span id="status-text">loading...</span>
  </div>
</header>

<main id="main">
  <div class="loading span-full">
    <span class="blink">█</span> connecting to Kroniqo...
  </div>
</main>

<button class="refresh-btn" onclick="loadData()">↺ Refresh</button>

<script>
// ── Data fetching ─────────────────────────────────────────────────────────────
// The UI reads from api.json (generated by api_server.py)
// Falls back to mock data if server not running

async function fetchBiography() {
  try {
    const r = await fetch('http://localhost:7842/api/biography', {
      signal: AbortSignal.timeout(2000)
    });
    return await r.json();
  } catch {
    return null;
  }
}

async function fetchDecisions() {
  try {
    const r = await fetch('http://localhost:7842/api/decisions', {
      signal: AbortSignal.timeout(2000)
    });
    return await r.json();
  } catch {
    return null;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function getPosture(domains) {
  // Overall posture = worst domain
  let hasConservative = false, hasBold = false;
  for (const d of Object.values(domains)) {
    if (d.recent_wrongs >= 3) hasConservative = true;
    if (d.recent_wrongs === 0 && d.total_decisions >= 5) hasBold = true;
  }
  if (hasConservative) return 'conservative';
  if (hasBold) return 'bold';
  return 'neutral';
}

function postureIcon(p) {
  return { conservative: '⚠', bold: '⚡', neutral: '◈' }[p];
}

function postureDesc(p) {
  return {
    conservative: 'Recent failures detected. Kroniqo is hedging.',
    bold: 'Strong recent form. Kroniqo is decisive.',
    neutral: 'Balanced. No strong signals either way.'
  }[p];
}

function accuracyColor(acc) {
  if (acc >= 0.75) return 'var(--correct)';
  if (acc >= 0.5) return 'var(--neutral)';
  return 'var(--wrong)';
}

function renderDomain(name, d) {
  const acc = d.weighted_accuracy;
  const pct = Math.round(acc * 100);
  const formDots = (d.recent_form || []).map(o =>
    `<div class="form-dot ${o}"></div>`
  ).join('');

  return `
    <div class="domain-item">
      <div class="domain-header">
        <span class="domain-name">[${name}]</span>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="calibration-tag ${d.calibration}">${d.calibration}</span>
          <span class="domain-acc">${pct}%</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:${accuracyColor(acc)}"></div>
      </div>
      <div class="domain-meta">
        <span>${d.total_decisions} decision${d.total_decisions !== 1 ? 's' : ''}</span>
        <div class="form-dots">${formDots}</div>
      </div>
    </div>
  `;
}

function renderDecision(d) {
  const outcome = d.outcome || 'pending';
  const task = d.task.length > 80 ? d.task.slice(0, 80) + '…' : d.task;
  const conf = d.confidence_expressed ? (d.confidence_expressed * 100).toFixed(0) + '%' : '?';
  return `
    <div class="decision-item">
      <div class="outcome-dot ${outcome}" title="${outcome}"></div>
      <div>
        <div class="decision-task">${task}</div>
        <div class="decision-domain">[${d.domain}] · ${conf} confidence</div>
      </div>
      <div class="decision-id">#${d.id}</div>
    </div>
  `;
}

async function loadData() {
  const main = document.getElementById('main');
  document.getElementById('status-text').textContent = 'refreshing...';

  const bio = await fetchBiography();
  const decisions = await fetchDecisions();

  if (!bio) {
    // Server not running — show how to start it
    document.getElementById('status-text').textContent = 'server offline';
    main.innerHTML = `
      <div class="card span-full" style="text-align:center;padding:3rem">
        <div style="color:var(--accent);font-size:1.2rem;margin-bottom:1rem">Start the API server</div>
        <div style="color:var(--muted);font-size:0.75rem;line-height:2">
          cd Kroniqo<br>
          python kroniqo-ui/api_server.py<br><br>
          Then refresh this page.
        </div>
      </div>
    `;
    return;
  }

  document.getElementById('status-text').textContent = `age: ${bio.age} decisions`;

  const domains = bio.domains || {};
  const posture = Object.keys(domains).length > 0 ? getPosture(domains) : 'neutral';

  const domainHTML = Object.keys(domains).length > 0
    ? Object.entries(domains).map(([n, d]) => renderDomain(n, d)).join('')
    : '<div style="color:var(--muted);font-size:0.75rem">No decisions recorded yet.</div>';

  const decisionsHTML = decisions && decisions.length > 0
    ? [...decisions].reverse().slice(0, 20).map(renderDecision).join('')
    : '<div style="color:var(--muted);font-size:0.75rem;padding:1rem">No decisions yet.</div>';

  // Overall accuracy
  let totalCorrect = 0, totalDecisions = 0;
  for (const d of Object.values(domains)) {
    totalCorrect += Math.round(d.raw_accuracy * d.total_decisions);
    totalDecisions += d.total_decisions;
  }
  const overallAcc = totalDecisions > 0 ? Math.round((totalCorrect / totalDecisions) * 100) : 0;

  main.innerHTML = `
    <!-- Age + Biography -->
    <div class="card card-age">
      <div>
        <div class="age-number">${bio.age}</div>
        <div class="age-label">consequential decisions</div>
      </div>
      <div class="biography-text">${bio.summary}</div>
      <div class="backend-info">
        <span class="backend-name">${(bio.backend || 'GROQ').toUpperCase()}</span>
        <span>${overallAcc}% overall accuracy</span><br>
        <span style="margin-top:0.25rem;display:block">${Object.keys(domains).length} active domains</span>
      </div>
    </div>

    <!-- Domains -->
    <div class="card">
      <div class="card-label">Domain Performance</div>
      <div class="domain-list">${domainHTML}</div>
    </div>

    <!-- Risk Posture -->
    <div class="card">
      <div class="card-label">Current Posture</div>
      <div class="posture-display">
        <div class="posture-icon">${postureIcon(posture)}</div>
        <div class="posture-name ${posture}">${posture.toUpperCase()}</div>
        <div class="posture-desc">${postureDesc(posture)}</div>
      </div>
    </div>

    <!-- Recent Decisions -->
    <div class="card span-full">
      <div class="card-label">Recent Decisions</div>
      <div class="decisions-list">${decisionsHTML}</div>
    </div>
  `;
}

// Auto-refresh every 10s
loadData();
setInterval(loadData, 10000);
</script>
</body>
</html>
